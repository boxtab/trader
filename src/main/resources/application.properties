spring.application.name     =   trader
server.port                 =   8055

# Settings File-based Vault
vault.enabled               =   false
vault.file.path             =   classpath:vault-secrets.enc
vault.file.key-path         =   ./vault-key.key
vault.file.algorithm        =   AES/CBC/PKCS5Padding

# Database connection
spring.datasource.url=jdbc:mysql://localhost:3306/webtrader?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=webtrader
spring.datasource.password=webtrader
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
